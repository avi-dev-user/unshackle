name: build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Use the org-wide PAT (avi-dev-user) — GITHUB_TOKEN doesn't have
          # write access to packages that were originally pushed by another
          # client (in our case the avi1 build-webhook using the same PAT).
          username: avi-dev-user
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Compute image tags + ArgoCD app name
        id: tags
        env:
          # Per-repo override of the image/app name. The k8s deployment name
          # (and therefore the GHCR image we push to + the ArgoCD app we sync)
          # often diverges from the GitHub repo name — set IMAGE_NAME on the
          # repo (Settings → Variables → Actions) for those cases. Falls back
          # to a lowercase-with-dashes form of the repo name otherwise.
          IMAGE_NAME_OVERRIDE: ${{ vars.IMAGE_NAME }}
        run: |
          SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ -n "$IMAGE_NAME_OVERRIDE" ]; then
            NAME="$IMAGE_NAME_OVERRIDE"
          else
            NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]_' '[:lower:]-')
          fi
          IMG=ghcr.io/${{ github.repository_owner }}/$NAME
          echo "tags=${IMG}:latest,${IMG}:${SHORT}" >> "$GITHUB_OUTPUT"
          echo "argocd_app=$NAME" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger ArgoCD sync on avi1
        # Forces ArgoCD to reconcile right now (without this we wait up to
        # 3 min for the next polling cycle). ImageUpdater scans during the
        # reconcile, sees the new :latest digest, writes back, syncs → pod
        # rolls. End-to-end push→running ≈ 30-60s instead of 3-5 min.
        env:
          AVI1_SSH_KEY: ${{ secrets.AVI1_SSH_KEY }}
          AVI1_HOST: ${{ secrets.AVI1_HOST }}
          AVI1_PORT: ${{ secrets.AVI1_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$AVI1_SSH_KEY" > ~/.ssh/avi1 && chmod 600 ~/.ssh/avi1
          ssh-keyscan -p "$AVI1_PORT" -H "$AVI1_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/avi1 -p "$AVI1_PORT" root@"$AVI1_HOST" \
            "kubectl --kubeconfig=/etc/rancher/k3s/k3s.yaml -n argocd patch application.argoproj.io/${{ steps.tags.outputs.argocd_app }} --type merge -p '{\"operation\":{\"sync\":{}}}'" || true
